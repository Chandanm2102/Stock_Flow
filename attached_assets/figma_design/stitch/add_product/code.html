<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Product</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .form-input-focus {
            @apply focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 lg:px-40">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-10 h-10 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">add_box</span>
</div>
<div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Add New Product</h2>
<p class="text-xs text-slate-500 dark:text-slate-400">Inventory Management System</p>
</div>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex-1 flex justify-center py-10 px-4">
<div class="w-full max-w-[960px] flex flex-col gap-8">
<!-- Page Title Section -->
<div class="flex flex-col gap-2">
<h1 class="text-3xl font-bold">Product Information</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Fill in the details below to add a new item to your store inventory.</p>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<!-- Left Column: Main Form Details -->
<div class="lg:col-span-2 flex flex-col gap-6">
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col gap-6">
<!-- Product Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Product Name</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="e.g. Wireless Noise Cancelling Headphones" type="text"/>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Description</label>
<textarea class="w-full min-h-[160px] rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="Describe the key features, specifications, and materials..."></textarea>
</div>
<!-- Grid for Category and SKU -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Category</label>
<select class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus">
<option value="">Select Category</option>
<option value="electronics">Electronics</option>
<option value="apparel">Apparel</option>
<option value="home">Home &amp; Garden</option>
<option value="sports">Sports</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">SKU (Stock Keeping Unit)</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="e.g. WH-1000XM4" type="text"/>
</div>
</div>
<!-- Grid for Price and Quantity -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Price ($)</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
<input class="w-full pl-8 rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Initial Stock Quantity</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="0" type="number"/>
</div>
</div>
<!-- Supplier -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Supplier</label>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 form-input-focus" placeholder="Enter supplier name or ID" type="text"/>
</div>
</div>
</div>
<!-- Right Column: Image Upload & Actions -->
<div class="flex flex-col gap-6">
<!-- Image Upload -->
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<label class="text-sm font-semibold block mb-4">Product Image</label>
<div class="relative group border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-8 flex flex-col items-center justify-center gap-3 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">cloud_upload</span>
</div>
<div class="text-center">
<p class="text-sm font-medium">Click to upload or drag and drop</p>
<p class="text-xs text-slate-500 mt-1">PNG, JPG or WebP (max. 5MB)</p>
</div>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Optional: Image Preview Placeholder -->
<div class="mt-4 hidden">
<div class="relative rounded-lg overflow-hidden h-48 bg-slate-200 dark:bg-slate-800">
<img class="w-full h-full object-cover" data-alt="Product preview image showing a pair of headphones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChHbKtllF0rVZ7904KD-y28aAordm72FGljiM5LIzEFh-WijqHRaUFhxNxM5Fh3DcPhF8ihH2GYB7ThUHhqtQtpacEcBYtbYiU-3FJS4We4mlcEOTHgQ80VBQVM5LCQSAcy7jDSpSNzmesCvHklEn6ECNJlJ3aKSCQyQZmKxmi9OtllR-uVpvowACtwpCje-t_mxMWz-qPHETYM8Z1tbYDGonupUGmTKvRFT9qH0pj5zktYflHXUU6LFQ8d2P8TcICuDUCFYJTIwE"/>
<button class="absolute top-2 right-2 p-1 bg-red-500 text-white rounded-full">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
</div>
<!-- Visibility / Status (Extra) -->
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<label class="text-sm font-semibold block mb-4">Inventory Status</label>
<div class="flex flex-col gap-3">
<label class="flex items-center gap-3 cursor-pointer">
<input checked="" class="text-primary focus:ring-primary h-4 w-4" name="status" type="radio"/>
<span class="text-sm">In Stock</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<input class="text-primary focus:ring-primary h-4 w-4" name="status" type="radio"/>
<span class="text-sm">Out of Stock</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<input class="text-primary focus:ring-primary h-4 w-4" name="status" type="radio"/>
<span class="text-sm">Backorder</span>
</label>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all">
<span class="material-symbols-outlined">save</span>
                            Save Product
                        </button>
<button class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-3 px-4 rounded-lg transition-all">
                            Cancel
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Meta -->
<footer class="mt-auto px-6 lg:px-40 py-8 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-400 text-xs">All changes are automatically saved as a draft every 30 seconds.</p>
</footer>
</div>
</body></html>
